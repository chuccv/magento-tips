<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
  <style>
    .code-block-wrapper { position: relative; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: #555; color: #fff; border: none;
      padding: 3px 10px; border-radius: 4px; font-size: 12px;
      cursor: pointer; opacity: 0.75; transition: opacity 0.2s, background 0.2s;
    }
    .copy-btn:hover { opacity: 1; }
    .copy-btn.copied { background: #2a9d5c; opacity: 1; }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("pre").forEach(function (pre) {
        var wrapper = document.createElement("div");
        wrapper.className = "code-block-wrapper";
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
        var btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copy";
        wrapper.appendChild(btn);
        btn.addEventListener("click", function () {
          var text = (pre.querySelector("code") || pre).innerText;
          navigator.clipboard.writeText(text).then(function () {
            btn.textContent = "Copied!";
            btn.classList.add("copied");
            setTimeout(function () { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
          });
        });
      });
    });
  </script>
</head>
